<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>肖聪AI聊天</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #ededed; height: 100vh; display: flex; justify-content: center; align-items: center; }

    /* 待机画面 */
    #standby {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff center/cover no-repeat;
      background-image: url('background.jpg'); /* 改成你的待机图片名 */
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 10; cursor: pointer;
    }
    #standby .enter-btn {
      margin-top: 50px; padding: 12px 40px; background: #07c160; color: #fff;
      border: none; border-radius: 30px; font-size: 18px; letter-spacing: 2px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* 聊天容器 */
    #chat-container {
      width: 100%; max-width: 500px; height: 100vh; background: #f5f5f5;
      display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1);
      position: relative; display: none;
    }
    /* 顶部标题栏 */
    .chat-header {
      background: #ededed; padding: 12px 16px; display: flex; align-items: center;
      border-bottom: 1px solid #d9d9d9;
    }
    .chat-header img { width: 40px; height: 40px; border-radius: 6px; margin-right: 10px; }
    .chat-header .name { font-size: 18px; font-weight: 500; }

    /* 消息区域 */
    .chat-messages {
      flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column;
    }
    .message {
      max-width: 75%; margin-bottom: 16px; display: flex; align-items: flex-start;
      animation: fadeInUp 0.3s ease;
    }
    .message.self { align-self: flex-end; }
    .message.other { align-self: flex-start; }
    .message img.avatar {
      width: 36px; height: 36px; border-radius: 6px; margin: 0 8px;
    }
    .message .bubble {
      padding: 10px 14px; border-radius: 8px; font-size: 16px;
      line-height: 1.5; word-break: break-all; position: relative;
    }
    .message.self .bubble { background: #95ec69; }
    .message.other .bubble { background: #fff; border: 1px solid #e0e0e0; }
    .message img.bubble-img {
      max-width: 200px; border-radius: 8px; display: block;
    }

    /* 输入区域 */
    .chat-input {
      display: flex; padding: 10px; background: #f7f7f7; border-top: 1px solid #d9d9d9;
    }
    .chat-input input {
      flex: 1; padding: 10px; border: 1px solid #d9d9d9; border-radius: 6px;
      font-size: 16px; outline: none;
    }
    .chat-input button {
      margin-left: 10px; padding: 10px 20px; background: #07c160; color: #fff;
      border: none; border-radius: 6px; font-size: 16px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- 待机画面：点击进入聊天 -->
  <div id="standby" onclick="enterChat()">
    <div class="enter-btn">开始聊天</div>
  </div>

  <!-- 聊天界面 -->
  <div id="chat-container">
    <div class="chat-header">
      <img src="touxiang.jpg" alt="头像"> <!-- 改成你的头像图片名 -->
      <div class="name">肖聪</div>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="说点什么..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>

  <script>
    // ========== 在这里修改你的配置 ==========
    const DEFAULT_REPLY = "你妈大臭逼。";   // 永远回复的那句话
    const TRIGGER_KEYWORD = "肖聪美图";       // 触发图片的关键词
    const SECRET_IMAGE = "xiaocongmeitu.jpg";     // 特定回复的图片文件名

    // 对方的头像（和顶部一样）
    const AI_AVATAR = "touxiang.jpg";
    // 用户的头像（可以随便找一个，或者用默认图）
    const USER_AVATAR = "user.jpg"; // 可以准备一张自己的头像，或者用同一张

    // 进入聊天
    function enterChat() {
      document.getElementById('standby').style.display = 'none';
      document.getElementById('chat-container').style.display = 'flex';
      // 自动来一句开场白
      addMessage('other', '我是肖聪。');
    }

    // 发送消息
    function sendMsg() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;
      
      // 显示用户消息
      addMessage('self', text);
      input.value = '';

      // 判断是否触发特殊回复
     if (text === TRIGGER_KEYWORD) {
  // 直接发图片，不再额外说话
  setTimeout(() => {
    addImageMessage('other', SECRET_IMAGE);
  }, 600);
}else {
        // 普通回复：永远回复同一句话
        setTimeout(() => {
          addMessage('other', DEFAULT_REPLY);
        }, 600);
      }
    }

    // 添加文字消息
    function addMessage(type, content) {
      const messagesDiv = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message ' + type;

      // 头像
      const avatar = document.createElement('img');
      avatar.className = 'avatar';
      avatar.src = type === 'self' ? USER_AVATAR : AI_AVATAR;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;

      if (type === 'self') {
        msgDiv.appendChild(bubble);
        msgDiv.appendChild(avatar);
      } else {
        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
      }

      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // 添加图片消息
    function addImageMessage(type, imgSrc) {
      const messagesDiv = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message ' + type;

      const avatar = document.createElement('img');
      avatar.className = 'avatar';
      avatar.src = type === 'self' ? USER_AVATAR : AI_AVATAR;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const img = document.createElement('img');
      img.className = 'bubble-img';
      img.src = imgSrc;
      bubble.appendChild(img);

      if (type === 'self') {
        msgDiv.appendChild(bubble);
        msgDiv.appendChild(avatar);
      } else {
        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
      }

      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
  </script>
</body>
</html>
